<script type="text/babel">
// ── animations.jsx ──────────────────────────────────────────────────────────

const Easing = {
  linear: (t) => t,
  easeInQuad:    (t) => t * t,
  easeOutQuad:   (t) => t * (2 - t),
  easeInOutQuad: (t) => (t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t),
  easeInCubic:    (t) => t * t * t,
  easeOutCubic:   (t) => (--t) * t * t + 1,
  easeInOutCubic: (t) => (t < 0.5 ? 4 * t * t * t : (t - 1) * (2 * t - 2) * (2 * t - 2) + 1),
  easeInQuart:    (t) => t * t * t * t,
  easeOutQuart:   (t) => 1 - (--t) * t * t * t,
  easeInOutQuart: (t) => (t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t),
  easeInExpo:  (t) => (t === 0 ? 0 : Math.pow(2, 10 * (t - 1))),
  easeOutExpo: (t) => (t === 1 ? 1 : 1 - Math.pow(2, -10 * t)),
  easeInOutExpo: (t) => {
    if (t === 0) return 0; if (t === 1) return 1;
    if (t < 0.5) return 0.5 * Math.pow(2, 20 * t - 10);
    return 1 - 0.5 * Math.pow(2, -20 * t + 10);
  },
  easeInSine:    (t) => 1 - Math.cos((t * Math.PI) / 2),
  easeOutSine:   (t) => Math.sin((t * Math.PI) / 2),
  easeInOutSine: (t) => -(Math.cos(Math.PI * t) - 1) / 2,
  easeOutBack: (t) => { const c1 = 1.70158, c3 = c1 + 1; return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2); },
  easeInBack: (t) => { const c1 = 1.70158, c3 = c1 + 1; return c3 * t * t * t - c1 * t * t; },
  easeInOutBack: (t) => {
    const c1 = 1.70158, c2 = c1 * 1.525;
    return t < 0.5
      ? (Math.pow(2 * t, 2) * ((c2 + 1) * 2 * t - c2)) / 2
      : (Math.pow(2 * t - 2, 2) * ((c2 + 1) * (t * 2 - 2) + c2) + 2) / 2;
  },
  easeOutElastic: (t) => {
    const c4 = (2 * Math.PI) / 3;
    if (t === 0) return 0; if (t === 1) return 1;
    return Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  },
};

const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

function interpolate(input, output, ease = Easing.linear) {
  return (t) => {
    if (t <= input[0]) return output[0];
    if (t >= input[input.length - 1]) return output[output.length - 1];
    for (let i = 0; i < input.length - 1; i++) {
      if (t >= input[i] && t <= input[i + 1]) {
        const span = input[i + 1] - input[i];
        const local = span === 0 ? 0 : (t - input[i]) / span;
        const easeFn = Array.isArray(ease) ? (ease[i] || Easing.linear) : ease;
        return output[i] + (output[i + 1] - output[i]) * easeFn(local);
      }
    }
    return output[output.length - 1];
  };
}

function animate({ from = 0, to = 1, start = 0, end = 1, ease = Easing.easeInOutCubic }) {
  return (t) => {
    if (t <= start) return from;
    if (t >= end) return to;
    return from + (to - from) * ease((t - start) / (end - start));
  };
}

const TimelineContext = React.createContext({ time: 0, duration: 10, playing: false });
const useTime = () => React.useContext(TimelineContext).time;
const useTimeline = () => React.useContext(TimelineContext);

const SpriteContext = React.createContext({ localTime: 0, progress: 0, duration: 0 });
const useSprite = () => React.useContext(SpriteContext);

function Sprite({ start = 0, end = Infinity, children, keepMounted = false }) {
  const { time } = useTimeline();
  const visible = time >= start && time <= end;
  if (!visible && !keepMounted) return null;
  const duration = end - start;
  const localTime = Math.max(0, time - start);
  const progress = duration > 0 && isFinite(duration) ? clamp(localTime / duration, 0, 1) : 0;
  const value = { localTime, progress, duration, visible };
  return (
    <SpriteContext.Provider value={value}>
      {typeof children === 'function' ? children(value) : children}
    </SpriteContext.Provider>
  );
}

function TextSprite({ text, x = 0, y = 0, size = 48, color = '#111', font = 'Inter, system-ui, sans-serif',
  weight = 600, entryDur = 0.45, exitDur = 0.35,
  entryEase = Easing.easeOutBack, exitEase = Easing.easeInCubic,
  align = 'left', letterSpacing = '-0.01em' }) {
  const { localTime, duration } = useSprite();
  const exitStart = Math.max(0, duration - exitDur);
  let opacity = 1, ty = 0;
  if (localTime < entryDur) {
    const t = entryEase(clamp(localTime / entryDur, 0, 1));
    opacity = t; ty = (1 - t) * 16;
  } else if (localTime > exitStart) {
    const t = exitEase(clamp((localTime - exitStart) / exitDur, 0, 1));
    opacity = 1 - t; ty = -t * 8;
  }
  const translateX = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';
  return (
    <div style={{ position: 'absolute', left: x, top: y,
      transform: `translate(${translateX}, ${ty}px)`, opacity,
      fontFamily: font, fontSize: size, fontWeight: weight,
      color, letterSpacing, whiteSpace: 'pre', lineHeight: 1.1,
      willChange: 'transform, opacity' }}>
      {text}
    </div>
  );
}

function Stage({ width = 1280, height = 720, duration = 10, background = '#f6f4ef',
  fps = 60, loop = true, autoplay = true, persistKey = 'animstage', children }) {
  const [time, setTime] = React.useState(() => {
    try {
      const v = parseFloat(localStorage.getItem(persistKey + ':t') || '0');
      return isFinite(v) ? clamp(v, 0, duration) : 0;
    } catch { return 0; }
  });
  const [playing, setPlaying] = React.useState(autoplay);
  const [hoverTime, setHoverTime] = React.useState(null);
  const [scale, setScale] = React.useState(1);
  const stageRef = React.useRef(null);
  const canvasRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const lastTsRef = React.useRef(null);

  React.useEffect(() => {
    try { localStorage.setItem(persistKey + ':t', String(time)); } catch {}
  }, [time, persistKey]);

  React.useEffect(() => {
    if (!stageRef.current) return;
    const el = stageRef.current;
    const measure = () => {
      const barH = 44;
      const s = Math.min(el.clientWidth / width, (el.clientHeight - barH) / height);
      setScale(Math.max(0.05, s));
    };
    measure();
    const ro = new ResizeObserver(measure);
    ro.observe(el);
    window.addEventListener('resize', measure);
    return () => { ro.disconnect(); window.removeEventListener('resize', measure); };
  }, [width, height]);

  React.useEffect(() => {
    if (!playing) { lastTsRef.current = null; return; }
    const step = (ts) => {
      if (lastTsRef.current == null) lastTsRef.current = ts;
      const dt = (ts - lastTsRef.current) / 1000;
      lastTsRef.current = ts;
      setTime((t) => {
        let next = t + dt;
        if (next >= duration) {
          if (loop) next = next % duration;
          else { next = duration; setPlaying(false); }
        }
        return next;
      });
      rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); lastTsRef.current = null; };
  }, [playing, duration, loop]);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.code === 'Space') { e.preventDefault(); setPlaying(p => !p); }
      else if (e.code === 'ArrowLeft') setTime(t => clamp(t - (e.shiftKey ? 1 : 0.1), 0, duration));
      else if (e.code === 'ArrowRight') setTime(t => clamp(t + (e.shiftKey ? 1 : 0.1), 0, duration));
      else if (e.key === '0' || e.code === 'Home') setTime(0);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [duration]);

  const displayTime = hoverTime != null ? hoverTime : time;
  const ctxValue = React.useMemo(
    () => ({ time: displayTime, duration, playing, setTime, setPlaying }),
    [displayTime, duration, playing]
  );

  return (
    <div ref={stageRef} style={{ position: 'absolute', inset: 0,
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      background: '#0a0a0a', fontFamily: 'Inter, system-ui, sans-serif' }}>
      <div style={{ flex: 1, width: '100%', display: 'flex', alignItems: 'center',
        justifyContent: 'center', overflow: 'hidden', minHeight: 0 }}>
        <div ref={canvasRef} style={{ width, height, background,
          position: 'relative', transform: `scale(${scale})`,
          transformOrigin: 'center', flexShrink: 0,
          boxShadow: '0 20px 60px rgba(0,0,0,0.4)', overflow: 'hidden' }}>
          <TimelineContext.Provider value={ctxValue}>
            {children}
          </TimelineContext.Provider>
        </div>
      </div>
      <PlaybackBar time={displayTime} actualTime={time} duration={duration} playing={playing}
        onPlayPause={() => setPlaying(p => !p)} onReset={() => setTime(0)}
        onSeek={(t) => setTime(t)} onHover={(t) => setHoverTime(t)} />
    </div>
  );
}

function PlaybackBar({ time, duration, playing, onPlayPause, onReset, onSeek, onHover }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const timeFromEvent = React.useCallback((e) => {
    const rect = trackRef.current.getBoundingClientRect();
    return clamp((e.clientX - rect.left) / rect.width, 0, 1) * duration;
  }, [duration]);
  const onTrackMove = (e) => {
    if (!trackRef.current) return;
    const t = timeFromEvent(e);
    if (dragging) onSeek(t); else onHover(t);
  };
  const onTrackLeave = () => { if (!dragging) onHover(null); };
  const onTrackDown = (e) => { setDragging(true); onSeek(timeFromEvent(e)); onHover(null); };
  React.useEffect(() => {
    if (!dragging) return;
    const onUp = () => setDragging(false);
    const onMove = (e) => { if (trackRef.current) onSeek(timeFromEvent(e)); };
    window.addEventListener('mouseup', onUp);
    window.addEventListener('mousemove', onMove);
    return () => { window.removeEventListener('mouseup', onUp); window.removeEventListener('mousemove', onMove); };
  }, [dragging, timeFromEvent, onSeek]);
  const pct = duration > 0 ? (time / duration) * 100 : 0;
  const fmt = (t) => {
    const total = Math.max(0, t);
    const m = Math.floor(total / 60), s = Math.floor(total % 60), cs = Math.floor((total * 100) % 100);
    return `${m}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
  };
  const mono = 'JetBrains Mono, ui-monospace, monospace';
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 16px',
      background: 'rgba(20,20,20,0.92)', borderTop: '1px solid rgba(255,255,255,0.08)',
      width: '100%', maxWidth: 680, alignSelf: 'center', borderRadius: 8,
      color: '#f6f4ef', fontFamily: 'Inter, system-ui, sans-serif', userSelect: 'none', flexShrink: 0 }}>
      <IconButton onClick={onReset} title="Return to start (0)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 2v10M12 2L5 7l7 5V2z" stroke="currentColor" strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
        </svg>
      </IconButton>
      <IconButton onClick={onPlayPause} title="Play/pause (space)">
        {playing ? (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="3" y="2" width="3" height="10" fill="currentColor"/>
            <rect x="8" y="2" width="3" height="10" fill="currentColor"/>
          </svg>
        ) : (
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 2l9 5-9 5V2z" fill="currentColor"/>
          </svg>
        )}
      </IconButton>
      <div style={{ fontFamily: mono, fontSize: 12, fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'right', color: '#f6f4ef' }}>{fmt(time)}</div>
      <div ref={trackRef} onMouseMove={onTrackMove} onMouseLeave={onTrackLeave} onMouseDown={onTrackDown}
        style={{ flex: 1, height: 22, position: 'relative', cursor: 'pointer',
          display: 'flex', alignItems: 'center' }}>
        <div style={{ position: 'absolute', left: 0, right: 0, height: 4,
          background: 'rgba(255,255,255,0.12)', borderRadius: 2 }} />
        <div style={{ position: 'absolute', left: 0, width: `${pct}%`, height: 4,
          background: 'oklch(72% 0.12 250)', borderRadius: 2 }} />
        <div style={{ position: 'absolute', left: `${pct}%`, top: '50%',
          width: 12, height: 12, marginLeft: -6, marginTop: -6,
          background: '#fff', borderRadius: 6, boxShadow: '0 2px 4px rgba(0,0,0,0.4)' }} />
      </div>
      <div style={{ fontFamily: mono, fontSize: 12, fontVariantNumeric: 'tabular-nums',
        width: 64, textAlign: 'left', color: 'rgba(246,244,239,0.55)' }}>{fmt(duration)}</div>
    </div>
  );
}

function IconButton({ children, onClick, title }) {
  const [hover, setHover] = React.useState(false);
  return (
    <button onClick={onClick} title={title}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{ width: 28, height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center',
        background: hover ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.04)',
        border: '1px solid rgba(255,255,255,0.1)', borderRadius: 6, color: '#f6f4ef',
        cursor: 'pointer', padding: 0, transition: 'background 120ms' }}>
      {children}
    </button>
  );
}

// ── scenes.jsx ──────────────────────────────────────────────────────────────

const P = {
  bg: '#0B0B1F', bg2: '#1A0F2E',
  ink: '#F8FAFC', ink2: 'rgba(248,250,252,0.6)', ink3: 'rgba(248,250,252,0.35)',
  violet: '#A855F7', cyan: '#22D3EE',
  magenta: '#FF3D8F', pink: '#FF6FAE', hotpink: '#FF1F70',
  lime: '#BEF264', amber: '#FBBF24',
  line: 'rgba(255,61,143,0.18)',
};

const FONT_DISPLAY = '"Manrope", "Inter", system-ui, sans-serif';
const FONT_BODY = '"Inter", system-ui, sans-serif';
const FONT_MONO = '"JetBrains Mono", ui-monospace, monospace';

function ParallaxBackground() {
  const t = useTime();
  const slowX = Math.sin(t * 0.08) * 30, slowY = Math.cos(t * 0.06) * 20;
  const midX  = Math.sin(t * 0.15 + 1) * 60, midY  = Math.cos(t * 0.11 + 0.5) * 40;
  const fastX = Math.sin(t * 0.25 + 2) * 90, fastY = Math.cos(t * 0.19 + 1.2) * 70;
  return (
    <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', pointerEvents: 'none' }}>
      <div style={{ position: 'absolute', inset: 0,
        background: `radial-gradient(ellipse 80% 60% at 50% 40%, ${P.bg2} 0%, ${P.bg} 70%)` }} />
      <div style={{ position: 'absolute',
        left: -100 + slowX, top: -100 + slowY, right: -100 - slowX, bottom: -100 - slowY,
        backgroundImage: `linear-gradient(${P.line} 1px, transparent 1px), linear-gradient(90deg, ${P.line} 1px, transparent 1px)`,
        backgroundSize: '80px 80px', opacity: 0.5,
        maskImage: 'radial-gradient(ellipse 80% 70% at 50% 50%, #000 30%, transparent 90%)',
        WebkitMaskImage: 'radial-gradient(ellipse 80% 70% at 50% 50%, #000 30%, transparent 90%)' }} />
      <div style={{ position: 'absolute', left: -200 + midX, top: -150 + midY, width: 700, height: 700,
        background: `radial-gradient(circle, ${P.violet}33 0%, transparent 60%)`, filter: 'blur(40px)' }} />
      <div style={{ position: 'absolute', right: -250 - midX, bottom: -200 - midY, width: 800, height: 800,
        background: `radial-gradient(circle, ${P.magenta}40 0%, transparent 60%)`, filter: 'blur(50px)' }} />
      <div style={{ position: 'absolute', right: -100 + midX * 0.5, top: 200 - midY * 0.5, width: 500, height: 500,
        background: `radial-gradient(circle, ${P.cyan}26 0%, transparent 60%)`, filter: 'blur(60px)' }} />
      {[[220,180,6,P.violet],[1480,140,4,P.magenta],[380,920,5,P.pink],[1620,880,7,P.magenta],
        [960,220,3,P.cyan],[120,600,4,P.pink],[1820,540,5,P.magenta],[820,940,4,P.cyan]].map(([px,py,r,c],i) => (
        <div key={i} style={{ position: 'absolute',
          left: px + fastX * (i % 2 ? 1 : -1) * 0.4,
          top:  py + fastY * (i % 3 ? 1 : -1) * 0.3,
          width: r*2, height: r*2, borderRadius: '50%',
          background: c, boxShadow: `0 0 ${r*4}px ${c}`, opacity: 0.7 }} />
      ))}
      <div style={{ position: 'absolute', inset: 0,
        backgroundImage: 'repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px)',
        pointerEvents: 'none' }} />
    </div>
  );
}

function Chip({ text, color = P.violet, x, y, delay = 0, size = 18 }) {
  const { localTime } = useSprite();
  const t = clamp((localTime - delay) / 0.4, 0, 1);
  const ease = Easing.easeOutBack(t);
  return (
    <div style={{ position: 'absolute', left: x, top: y,
      transform: `translate(-50%, -50%) scale(${ease})`, opacity: t,
      padding: '8px 16px', borderRadius: 999,
      background: `${color}1A`, border: `1px solid ${color}66`, color: P.ink,
      fontFamily: FONT_BODY, fontSize: size, fontWeight: 500, letterSpacing: '-0.005em',
      whiteSpace: 'nowrap', backdropFilter: 'blur(6px)', boxShadow: `0 0 24px ${color}33` }}>
      {text}
    </div>
  );
}

function GlowText({ text, x, y, size = 120, color = P.ink, weight = 800, delay = 0, accent = P.violet, align = 'center' }) {
  const { localTime } = useSprite();
  const t = clamp((localTime - delay) / 0.6, 0, 1);
  const ease = Easing.easeOutCubic(t);
  const tx = align === 'center' ? '-50%' : align === 'right' ? '-100%' : '0';
  return (
    <div style={{ position: 'absolute', left: x, top: y,
      transform: `translate(${tx}, ${(1 - ease) * 24}px)`, opacity: ease,
      fontFamily: FONT_DISPLAY, fontSize: size, fontWeight: weight, color,
      letterSpacing: '-0.035em', lineHeight: 0.95,
      textShadow: `0 0 60px ${accent}44`, whiteSpace: 'pre' }}>
      {text}
    </div>
  );
}

function NeonRule({ x, y, w, color = P.violet, delay = 0, height = 2 }) {
  const { localTime } = useSprite();
  const t = clamp((localTime - delay) / 0.5, 0, 1);
  const ease = Easing.easeOutExpo(t);
  return (
    <div style={{ position: 'absolute', left: x, top: y,
      width: w * ease, height,
      background: `linear-gradient(90deg, transparent, ${color}, transparent)`,
      boxShadow: `0 0 12px ${color}`, borderRadius: 2 }} />
  );
}

function KeyValue({ label, value, x, y, delay = 0, color = P.cyan }) {
  const { localTime } = useSprite();
  const t = clamp((localTime - delay) / 0.5, 0, 1);
  return (
    <div style={{ position: 'absolute', left: x, top: y,
      transform: `translateY(${(1 - Easing.easeOutCubic(t)) * 12}px)`, opacity: t,
      fontFamily: FONT_MONO, fontSize: 14, letterSpacing: '0.08em',
      textTransform: 'uppercase', color: P.ink3 }}>

function puzzlePath(pw, ph, m, col, row, cols, rows) {
  const tw = 60, bh = 28, co = bh * 1.32;
  const x0 = m, y0 = m, x1 = m + pw, y1 = m + ph;
  const mxA = x0 + pw/2 - tw/2, mxB = x0 + pw/2 + tw/2;
  const myA = y0 + ph/2 - tw/2, myB = y0 + ph/2 + tw/2;
  const hasTop = row > 0, hasRight = col < cols-1, hasBottom = row < rows-1, hasLeft = col > 0;
  let d = `M ${x0} ${y0}`;
  d += ` L ${mxA} ${y0}`;
  if (hasTop) d += ` C ${mxA} ${y0+co}, ${mxB} ${y0+co}, ${mxB} ${y0}`;
  d += ` L ${x1} ${y0} L ${x1} ${myA}`;
  if (hasRight) d += ` C ${x1+co} ${myA}, ${x1+co} ${myB}, ${x1} ${myB}`;
  d += ` L ${x1} ${y1} L ${mxB} ${y1}`;
  if (hasBottom) d += ` C ${mxB} ${y1+co}, ${mxA} ${y1+co}, ${mxA} ${y1}`;
  d += ` L ${x0} ${y1} L ${x0} ${myB}`;
  if (hasLeft) d += ` C ${x0+co} ${myB}, ${x0+co} ${myA}, ${x0} ${myA}`;
  d += ` L ${x0} ${y0} Z`;
  return d;
}

// ── Main App ─────────────────────────────────────────────────────────────────

const DURATION = 89;

function TimeLabel() {
  const t = useTime();
  React.useEffect(() => {
    const el = document.body;
    const m = Math.floor(t / 60), s = Math.floor(t % 60);
    el.setAttribute('data-screen-label', `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} — Хакни запуск с AI`);
  }, [Math.floor(t)]);
  return null;
}

function ProgressDots() {
  const t = useTime();
  const sections = [
    { start: 0,    label: 'HOOK'    },
    { start: 4.5,  label: 'SLOGAN'  },
    { start: 11.5, label: 'PROMISE' },
    { start: 17.5, label: 'PAIN'    },
    { start: 24,   label: 'WHY'     },
    { start: 32,   label: 'BRAIN'   },
    { start: 40,   label: 'AGENTS'  },
    { start: 50,   label: 'WEEKS'   },
    { start: 62,   label: 'OUTCOME' },
    { start: 69,   label: 'PRICE'   },
    { start: 81,   label: 'CTA'     },
  ];
  return (
    <div style={{ position: 'absolute', right: 60, top: 60,
      display: 'flex', gap: 8, alignItems: 'center', zIndex: 10 }}>
      {sections.map((s, i) => {
        const next = sections[i+1] ? sections[i+1].start : DURATION;
        const active = t >= s.start && t < next;
        const past = t >= next;
        return (
          <div key={i} style={{
            width: active ? 28 : 8, height: 8,
            background: past ? P.ink3 : active ? P.violet : 'rgba(255,255,255,0.12)',
            boxShadow: active ? `0 0 12px ${P.violet}` : 'none',
            borderRadius: 4, transition: 'width 300ms, background 300ms' }} />
        );
      })}
      <div style={{ marginLeft: 16, fontFamily: FONT_MONO, fontSize: 12, color: P.ink3, letterSpacing: '0.2em' }}>
        {String(Math.floor(t)).padStart(2,'0')} / {DURATION}
      </div>
    </div>
  );
}

function BrandMark() {
  return (
    <div style={{ position: 'absolute', left: 60, top: 60,
      display: 'flex', alignItems: 'center', gap: 12, zIndex: 10 }}>

}
