<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<title>Хакни запуск с AI — анимация</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #050510; overflow: hidden; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<template id="__bundler_thumbnail" data-bg-color="#0B0B1F">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#A855F7"/>
        <stop offset="1" stop-color="#22D3EE"/>
      </linearGradient>
    </defs>
    <rect x="180" y="280" width="840" height="240" rx="40" fill="url(#g)"/>
    <text x="600" y="445" text-anchor="middle" font-family="Manrope, sans-serif" font-weight="900" font-size="160" fill="#0B0B1F" letter-spacing="-6">AI</text>
  </svg>
</template>
<body data-screen-label="00:00 — Хакни запуск с AI · 16:9 · 89s">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="scenes.jsx"></script>
<script type="text/babel" src="scenes_slice.jsx"></script>
<script type="text/babel" src="scenes2.jsx"></script>

<script type="text/babel">
const DURATION = 89;

function TimeLabel() {
  const t = useTime();
  React.useEffect(() => {
    const el = document.body;
    const m = Math.floor(t / 60), s = Math.floor(t % 60);
    el.setAttribute('data-screen-label', `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} — Хакни запуск с AI`);
  }, [Math.floor(t)]);
  return null;
}

function ProgressDots() {
  const t = useTime();
  const sections = [
    { start: 0, label: 'HOOK' },
    { start: 4.5, label: 'SLOGAN' },
    { start: 11.5, label: 'PROMISE' },
    { start: 17.5, label: 'PAIN' },
    { start: 24, label: 'WHY' },
    { start: 32, label: 'BRAIN' },
    { start: 40, label: 'AGENTS' },
    { start: 50, label: 'WEEKS' },
    { start: 62, label: 'OUTCOME' },
    { start: 69, label: 'PRICE' },
    { start: 81, label: 'CTA' },
  ];
  return (
    <div style={{
      position: 'absolute', right: 60, top: 60,
      display: 'flex', gap: 8, alignItems: 'center',
      zIndex: 10,
    }}>
      {sections.map((s, i) => {
        const next = sections[i+1] ? sections[i+1].start : DURATION;
        const active = t >= s.start && t < next;
        const past = t >= next;
        return (
          <div key={i} style={{
            width: active ? 28 : 8, height: 8,
            background: past ? P.ink3 : active ? P.violet : 'rgba(255,255,255,0.12)',
            boxShadow: active ? `0 0 12px ${P.violet}` : 'none',
            borderRadius: 4,
            transition: 'width 300ms, background 300ms',
          }} />
        );
      })}
      <div style={{
        marginLeft: 16,
        fontFamily: FONT_MONO, fontSize: 12, color: P.ink3,
        letterSpacing: '0.2em',
      }}>
        {String(Math.floor(t)).padStart(2,'0')} / {DURATION}
      </div>
    </div>
  );
}

function BrandMark() {
  return (
    <div style={{
      position: 'absolute', left: 60, top: 60,
      display: 'flex', alignItems: 'center', gap: 12,
      zIndex: 10,
    }}>
      <div style={{
        width: 12, height: 12, borderRadius: 4,
        background: `linear-gradient(135deg, ${P.violet}, ${P.cyan})`,
        boxShadow: `0 0 12px ${P.violet}`,
      }} />
      <div style={{
        fontFamily: FONT_MONO, fontSize: 13,
        color: P.ink2, letterSpacing: '0.25em',
        textTransform: 'uppercase',
      }}>
        Хакни запуск с AI
      </div>
    </div>
  );
}

function App() {
  return (
    <Stage width={1920} height={1080} duration={DURATION} background={P.bg} persistKey="hackni-main">
      <ParallaxBackground />
      <BrandMark />
      <ProgressDots />
      <TimeLabel />
      <SceneHook />
      <SceneSlice />
      <SceneMainPromise />
      <ScenePain />
      <SceneFiveBuys />
      <SceneSixModules />
      <SceneAgents />
      <SceneWeeks />
      <SceneOutcomes />
      <ScenePricing />
      <SceneCTA />
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
